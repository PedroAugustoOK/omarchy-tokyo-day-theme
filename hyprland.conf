# Tokyo Day visual overrides for Omarchy/Hyprland.
# This is not a complete Hyprland config.

general {
    col.active_border = rgba(3b64c4ee) rgba(d86aa7dd) 35deg
    col.inactive_border = rgba(cfc2b888)
    gaps_in = 4
    gaps_out = 6
    border_size = 2
}

group {
    col.border_active = rgba(3b64c4ee) rgba(d86aa7dd) 35deg
    col.border_inactive = rgba(cfc2b888)

    groupbar {
        col.active = rgba(3b64c444)
        col.inactive = rgba(eee6dcaa)
        text_color = rgb(2d3046)
        text_color_inactive = rgba(75778bcc)
    }
}

decoration {
    rounding = 3
    rounding_power = 3

    shadow {
        enabled = yes
        render_power = 4
        range = 14
        color = rgba(24283b24)
    }

    blur {
        enabled = true
        size = 2
        passes = 2
        special = true
        brightness = 1.04
        contrast = 0.93
    }
}
