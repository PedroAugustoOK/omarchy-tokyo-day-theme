# Tokyo Day visual overrides for Omarchy/Hyprland.
# This is not a complete Hyprland config.

general {
    col.active_border = rgba(3b64c4ee) rgba(d86aa7dd) rgba(f7f1eaaa) 35deg
    col.inactive_border = rgba(cfc2b892)
    gaps_in = 4
    gaps_out = 7
    border_size = 2
}

group {
    col.border_active = rgba(3b64c4ee) rgba(d86aa7dd) 35deg
    col.border_inactive = rgba(cfc2b892)

    groupbar {
        col.active = rgba(3b64c440)
        col.inactive = rgba(eee6dcaa)
        text_color = rgb(2d3046)
        text_color_inactive = rgba(75778bcc)
    }
}

decoration {
    rounding = 4
    rounding_power = 3

    shadow {
        enabled = yes
        render_power = 5
        range = 18
        color = rgba(24283b2c)
    }

    blur {
        enabled = true
        size = 3
        passes = 2
        special = true
        brightness = 1.04
        contrast = 0.92
        noise = 0.011
    }
}

misc {
    background_color = rgb(f7f1ea)
}
